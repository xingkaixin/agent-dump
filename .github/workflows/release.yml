name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Python dependencies
        run: uv sync --dev --python ${{ env.PYTHON_VERSION }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate tag version
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ ! "${TAG_NAME}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid tag format: ${TAG_NAME}"
            exit 1
          fi

          TAG_VERSION="${BASH_REMATCH[1]}"
          PACKAGE_VERSION="$(uv run python -c 'from agent_dump.__about__ import __version__; print(__version__)')"

          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match package version ${PACKAGE_VERSION}"
            exit 1
          fi

          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "${GITHUB_ENV}"

      - name: Sync npm versions
        run: node npm/scripts/sync-version.mjs

      - name: Lint
        run: just lint

      - name: Check
        run: just check

      - name: Test
        run: just test

      - name: Test npm wrapper
        run: npm --prefix npm test

  build-native:
    name: Build Native ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary_name: agent-dump
          - os: windows-latest
            target: win32-x64
            binary_name: agent-dump.exe
          - os: macos-15-intel
            target: darwin-x64
            binary_name: agent-dump
          - os: macos-14
            target: darwin-arm64
            binary_name: agent-dump

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --dev --python ${{ env.PYTHON_VERSION }}

      - name: Build native binary
        env:
          PYINSTALLER_CONFIG_DIR: .pyinstaller
        run: >
          uv run --with pyinstaller pyinstaller packaging/pyinstaller.spec
          --clean
          --noconfirm
          --distpath dist/native/${{ matrix.target }}
          --workpath build/pyinstaller/${{ matrix.target }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/native/${{ matrix.target }}/${{ matrix.binary_name }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build-native
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --dev --python ${{ env.PYTHON_VERSION }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@agent-dump"

      - name: Resolve release version
        shell: bash
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: dist/native/linux-x64

      - name: Download windows binary
        uses: actions/download-artifact@v4
        with:
          name: native-win32-x64
          path: dist/native/win32-x64

      - name: Download darwin x64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-x64
          path: dist/native/darwin-x64

      - name: Download darwin arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: dist/native/darwin-arm64

      - name: Make Unix binaries executable
        run: chmod +x dist/native/linux-x64/agent-dump dist/native/darwin-x64/agent-dump dist/native/darwin-arm64/agent-dump

      - name: Sync npm versions
        run: node npm/scripts/sync-version.mjs

      - name: Stage npm binaries
        run: |
          node npm/scripts/stage-binaries.mjs linux-x64 dist/native/linux-x64/agent-dump
          node npm/scripts/stage-binaries.mjs win32-x64 dist/native/win32-x64/agent-dump.exe
          node npm/scripts/stage-binaries.mjs darwin-x64 dist/native/darwin-x64/agent-dump
          node npm/scripts/stage-binaries.mjs darwin-arm64 dist/native/darwin-arm64/agent-dump

      - name: Validate staged npm binaries
        run: node npm/scripts/validate-staged-binaries.mjs

      - name: Write npm binary checksums
        run: node npm/scripts/write-checksums.mjs

      - name: Build PyPI distributions
        run: uv build --no-sources

      - name: Publish npm platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish ./npm/packages/cli-linux-x64 --access public
          npm publish ./npm/packages/cli-win32-x64 --access public
          npm publish ./npm/packages/cli-darwin-x64 --access public
          npm publish ./npm/packages/cli-darwin-arm64 --access public

      - name: Publish npm CLI package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./npm/packages/cli --access public

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: uv publish

      - name: Stage GitHub release assets
        shell: bash
        run: |
          mkdir -p dist/release
          cp dist/native/linux-x64/agent-dump dist/release/agent-dump-linux-x64
          cp dist/native/win32-x64/agent-dump.exe dist/release/agent-dump-win32-x64.exe
          cp dist/native/darwin-x64/agent-dump dist/release/agent-dump-darwin-x64
          cp dist/native/darwin-arm64/agent-dump dist/release/agent-dump-darwin-arm64
          cp npm/packages/cli/lib/binary-checksums.json dist/release/agent-dump-binary-checksums.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/agent-dump-linux-x64
            dist/release/agent-dump-win32-x64.exe
            dist/release/agent-dump-darwin-x64
            dist/release/agent-dump-darwin-arm64
            dist/release/agent-dump-binary-checksums.json
            dist/agent_dump-${{ env.PACKAGE_VERSION }}.tar.gz
            dist/agent_dump-${{ env.PACKAGE_VERSION }}-py3-none-any.whl

  smoke-npm:
    name: Smoke npx ${{ matrix.os }}
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15-intel
          - macos-14

    steps:
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Smoke test npx package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            if npx @agent-dump/cli@"${VERSION}" --help; then
              exit 0
            fi
            sleep 15
          done
          exit 1

  smoke-bun:
    name: Smoke bunx
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Smoke test bunx package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            if bunx @agent-dump/cli@"${VERSION}" --help; then
              exit 0
            fi
            sleep 15
          done
          exit 1
