<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fdfcfc" />
    <meta
      name="description"
      content="Agent Dump exports sessions from Codex, Claude Code, Kimi, OpenCode, and Cursor — list, dump, export, summarize, and get stats from one CLI."
    />
    <title>Agent Dump | Session Export for AI Coding Tools</title>
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="apple-touch-icon" href="./assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "004af8c09ea3455ea8a2b53f0a913be2"}'
    ></script>
    <script src="./version-data.js"></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="skipLink">Skip to content</a>

    <header class="topbar">
      <a class="brand" href="#" aria-label="Agent Dump home">
        <img src="./assets/logo.png" alt="" width="32" height="32" />
        <strong>Agent Dump</strong>
      </a>

      <div class="segmented-control" role="group" aria-label="Language switch">
        <button
          type="button"
          class="segmented-button"
          data-lang-toggle="en"
          aria-pressed="true"
        >EN</button>
        <button
          type="button"
          class="segmented-button"
          data-lang-toggle="zh"
          aria-pressed="false"
        >中文</button>
      </div>
    </header>

    <main id="main">
      <section id="hero" class="hero">
        <p class="eyebrow" data-i18n="eyebrow">CLI · AI Session Export</p>
        <h1 data-i18n="heroTitle">Export AI coding sessions.</h1>
        <p class="description" data-i18n="heroDescription">
          List, dump, export, and summarize sessions from Codex, Claude Code, Kimi, and OpenCode.
        </p>
        <p class="release-meta">
          <span data-i18n="versionLabel">Version</span>
          <a
            id="release-link"
            class="release-link"
            href="https://github.com/xingkaixin/agent-dump/blob/main/CHANGELOG.md"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span id="release-version">0.6.17</span>
          </a>
        </p>

        <div class="terminal" aria-label="Terminal showing example agent-dump commands">
          <div class="terminal-bar" aria-hidden="true">
            <span class="terminal-dot"></span>
            <span class="terminal-dot"></span>
            <span class="terminal-dot"></span>
          </div>
          <div class="terminal-body">
            <div class="terminal-line">
              <span class="prompt" aria-hidden="true">$</span>
              <span id="typed-text" class="typed-text" aria-live="off"></span><span class="cursor" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </section>

      <section id="install" class="install-section">
        <h2 data-i18n="installHeading">Install</h2>
        <div class="install-groups" data-install-grid></div>
        <div class="skill-block">
          <p class="skill-label" data-i18n="skillNote">Or add as an agent skill:</p>
          <div class="command-line">
            <span class="prompt" aria-hidden="true">$</span>
            <pre id="skill-install" class="command-code">npx skills add xingkaixin/agent-dump</pre>
            <button
              type="button"
              class="copy-button"
              data-copy-target="skill-install"
              data-copy-title
              aria-label="Copy"
            >
              <span class="button-icon-stack" aria-hidden="true">
                <span class="copy-icon"></span>
                <span class="check-icon"></span>
              </span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>Agent Dump</span>
      <a
        href="https://github.com/xingkaixin/agent-dump"
        target="_blank"
        rel="noopener noreferrer"
        data-i18n="footerGithub"
      >GitHub</a>
    </footer>
  </body>
</html>
